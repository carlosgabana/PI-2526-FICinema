databases:
  - name: ficinema-db
    plan: free
    databaseName: ficinema
    user: ficinema

services:
  - type: web
    name: ficinema
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: ficinema-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: PAYMENT_SIMULATION_MODE
        value: "True"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: PUBLIC_BASE_URL
        value: "https://ficinema.onrender.com"
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: EMAIL_PROVIDER
        value: "resend"
      - key: EMAIL_REQUIRED_FOR_PURCHASE
        value: "False"
      - key: EMAIL_TIMEOUT
        value: "6"
      - key: EMAIL_TEST_RECIPIENT_OVERRIDE
        value: "ficinema.notificaciones@gmail.com"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "FICinema <onboarding@resend.dev>"
      - key: DEFAULT_FROM_EMAIL
        value: "FICinema <onboarding@resend.dev>"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
